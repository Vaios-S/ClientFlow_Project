<!doctype html>
<html lang="el">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Projects - ClientFlow</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-theme="light" data-accent="lime">
    <div class="app-shell">
      <aside class="sidebar" id="sidebar-container"></aside>

      <main class="main-content">
        <header class="topbar">
          <div>
            <p class="page-eyebrow">Workspace</p>
            <h2 class="page-title">Projects</h2>
          </div>

          <div class="topbar__actions">
            <button type="button" class="primary-btn" id="addProject">
              Add Project
            </button>
          </div>
        </header>

        <section class="hidden" id="addProjectModal">
          <div class="addClient-card">
            <form id="projectForm">
              <h3>Add New Project</h3>

              <label for="projectName">Project Name:</label>
              <input type="text" id="projectName" name="projectName" required />

              <label for="companyName">Company Name:</label>
              <select id="companyName" name="companyName" required></select>
              <label for="teamMembers">Team Members:</label>
              <select id="teamMembers" name="teamMembers" required></select>
              <label for="status">Status:</label>
              <div class="status-tags">
                <input
                  type="radio"
                  name="status"
                  id="planning"
                  value="Planning"
                  checked
                />
                <label for="planning">Planning</label>
                <input
                  type="radio"
                  name="status"
                  id="inProgress"
                  value="In Progress"
                />
                <label for="inProgress">In Progress</label>
                <input type="radio" name="status" id="review" value="Review" />
                <label for="review">Review</label>
                <input
                  type="radio"
                  name="status"
                  id="Blocked"
                  value="Blocked"
                />
                <label for="Blocked">Blocked</label>
                <input
                  type="radio"
                  name="status"
                  id="completed"
                  value="Completed"
                />
                <label for="completed">Completed</label>
              </div>

              <label for="priority">Priority:</label>
              <div class="status-tags">
                <input
                  type="radio"
                  name="priority"
                  id="low"
                  value="Low"
                  checked
                />
                <label for="low">Low</label>
                <input
                  type="radio"
                  name="priority"
                  id="medium"
                  value="Medium"
                />
                <label for="medium">Medium</label>
                <input type="radio" name="priority" id="high" value="High" />
                <label for="high">High</label>
              </div>

              <label for="dueDate">Due Date:</label>
              <input type="date" id="dueDate" name="dueDate" required />

              <label for="budget">Budget:</label>
              <input type="number" id="budget" name="budget" required />

              <div class="addClient-actions">
                <button
                  type="button"
                  class="secondary-btn"
                  id="closeProjectModal"
                >
                  Cancel
                </button>
                <button type="submit" class="primary-btn" id="createClient">
                  Create Project
                </button>
              </div>
            </form>
          </div>
        </section>

        <section class="panel">
          <div class="panel__header">
            <div>
              <h3>All Projects</h3>
              <p class="panel__description">
                Manage active client work, deadlines, owners and budgets.
              </p>
            </div>
          </div>

          <div class="toolbar">
            <div class="toolbar__search">
              <input
                type="text"
                id="searchProject"
                placeholder="Search projects, clients..."
              />
            </div>

            <div class="toolbar__filters">
              <select id="selectedClient"></select>

              <select id="selectedTeamMembers"></select>

              <select id="selectedStatus">
                <option value="All Statuses">All Statuses</option>
                <option value="Planning">Planning</option>
                <option value="In Progress">In Progress</option>
                <option value="Review">Review</option>
                <option value="Completed">Completed</option>
                <option value="Blocked">Blocked</option>
              </select>

              <select id="selectedPriority">
                <option value="All Priorities">All Priorities</option>
                <option value="Low">Low</option>
                <option value="Medium">Medium</option>
                <option value="High">High</option>
              </select>

              <button type="button" class="primary-btn btnflex" id="clearBtn">
                Clear
              </button>
            </div>
          </div>

          <div class="table-wrapper">
            <table class="data-table" id="renderProjects"></table>
          </div>
        </section>
      </main>
    </div>

    <section class="hidden" id="editProjectModal">
      <div class="addClient-card">
        <form id="editProjectForm">
          <h3>Edit Project</h3>

          <label for="editProjectName">Project Name:</label>
          <input type="text" id="editProjectName" name="projectName" required />

          <label for="editCompanyName">Company Name:</label>
          <select id="editCompanyName" name="clientName" required></select>

          <label for="editTeamMembers">Team Members:</label>
          <select id="editTeamMembers" name="teamMembers" required></select>

          <label for="editStatus">Status:</label>
          <div class="status-tags">
            <input
              type="radio"
              name="editStatus"
              id="editPlanning"
              value="Planning"
              checked
            />
            <label for="editPlanning">Planning</label>
            <input
              type="radio"
              name="editStatus"
              id="editInProgress"
              value="In Progress"
            />
            <label for="editInProgress">In Progress</label>
            <input
              type="radio"
              name="editStatus"
              id="editReview"
              value="Review"
            />
            <label for="editReview">Review</label>
            <input
              type="radio"
              name="editStatus"
              id="editBlocked"
              value="Blocked"
            />
            <label for="editBlocked">Blocked</label>
            <input
              type="radio"
              name="editStatus"
              id="editCompleted"
              value="Completed"
            />
            <label for="editCompleted">Completed</label>
          </div>

          <label for="editPriority">Priority:</label>
          <div class="status-tags">
            <input
              type="radio"
              name="editPriority"
              id="editLow"
              value="Low"
              checked
            />
            <label for="editLow">Low</label>
            <input
              type="radio"
              name="editPriority"
              id="editMedium"
              value="Medium"
            />
            <label for="editMedium">Medium</label>
            <input
              type="radio"
              name="editPriority"
              id="editHigh"
              value="High"
            />
            <label for="editHigh">High</label>
          </div>

          <label for="editDueDate">Due Date:</label>
          <input type="date" id="editDueDate" name="dueDate" required />

          <label for="editBudget">Budget:</label>
          <input type="number" id="editBudget" name="budget" required />

          <div class="addClient-actions">
            <button
              type="button"
              class="secondary-btn"
              id="closeEditProjectModal"
            >
              Cancel
            </button>

            <button type="submit" class="primary-btn" id="saveProjectChanges">
              Save Changes
            </button>
          </div>
        </form>
      </div>
    </section>

    <div id="confirmModal" class="hidden">
      <div class="confirm-card">
        <h3>Delete project?</h3>
        <p>This action cannot be undone.</p>

        <div class="confirm-actions">
          <button type="button" class="secondary-btn" id="cancelDelete">
            Cancel
          </button>
          <button type="button" class="danger-btn" id="confirmDelete">
            Delete
          </button>
        </div>
      </div>
    </div>

    <div id="toastContainer" class="toast-container"></div>

    <script src="./js/projects.js"></script>

    <script src="./js/global.js"></script>
  </body>
</html>
